<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoodNear - Iniciar Sesión</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <div class="logo-title">🍔 Foodini</div>
      <h2>Iniciar Sesión</h2>
      <div class="msg error" id="msg"></div>
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" id="email" placeholder="tu@correo.com">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="••••••••">
      </div>
      <button class="btn" onclick="login()">Entrar</button>
      <div class="auth-link">
        ¿No tienes cuenta? <a href="register.html">Regístrate aquí</a>
      </div>
    </div>
  </div>

  <script>
    // Si ya hay sesión, redirigir
    if (localStorage.getItem('user')) window.location.href = 'index.html';

    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const msg = document.getElementById('msg');

      if (!email || !password) {
        msg.textContent = 'Por favor llena todos los campos';
        msg.className = 'msg error'; msg.style.display = 'block'; return;
      }

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (!res.ok) {
          msg.textContent = data.error || 'Error al iniciar sesión';
          msg.className = 'msg error'; msg.style.display = 'block'; return;
        }

        localStorage.setItem('user', JSON.stringify(data.user));
        localStorage.setItem('token', data.token);
        window.location.href = 'index.html';

      } catch (e) {
        msg.textContent = 'Error de conexión';
        msg.className = 'msg error'; msg.style.display = 'block';
      }
    }

    // Enter para login
    document.addEventListener('keypress', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
