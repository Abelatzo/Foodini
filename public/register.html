<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoodNear - Registro</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <div class="logo-title">🍔 Foodini</div>
      <h2>Crear Cuenta</h2>
      <div class="msg error" id="msg"></div>
      <div class="form-group">
        <label>Nombre completo</label>
        <input type="text" id="name" placeholder="Juan García">
      </div>
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" id="email" placeholder="tu@correo.com">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="Mínimo 6 caracteres">
      </div>
      <button class="btn" onclick="register()">Crear cuenta</button>
      <div class="auth-link">
        ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
      </div>
    </div>
  </div>

  <script>
    async function register() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const msg = document.getElementById('msg');

      if (!name || !email || !password) {
        msg.textContent = 'Por favor llena todos los campos';
        msg.className = 'msg error'; msg.style.display = 'block'; return;
      }
      if (password.length < 6) {
        msg.textContent = 'La contraseña debe tener al menos 6 caracteres';
        msg.className = 'msg error'; msg.style.display = 'block'; return;
      }

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();

        if (!res.ok) {
          msg.textContent = data.error || 'Error al registrar';
          msg.className = 'msg error'; msg.style.display = 'block'; return;
        }

        msg.textContent = 'Cuenta creada. Redirigiendo...';
        msg.className = 'msg success'; msg.style.display = 'block';
        setTimeout(() => window.location.href = 'login.html', 1500);

      } catch (e) {
        msg.textContent = 'Error de conexión';
        msg.className = 'msg error'; msg.style.display = 'block';
      }
    }

    document.addEventListener('keypress', e => { if (e.key === 'Enter') register(); });
  </script>
</body>
</html>
